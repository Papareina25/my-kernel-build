name: Build Kernel with KSU Next & SuSFS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update || true
          sudo apt-get install -y bc bison build-essential flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Clone Kernel and Tools
        run: |
          git clone https://github.com/crdroidandroid/android_kernel_oneplus_sdm845 -b 13.0 kernel
          git clone https://github.com/kdrag0n/proton-clang --depth=1 clang
          git clone https://github.com/osm0sis/AnyKernel3 --depth=1 anykernel

      - name: Integrate KSU Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifscc/KernelSU-Next/main/kernel/setup.sh" | bash -

      - name: Integrate SuSFS
        run: |
          cd kernel
          curl -LSs https://raw.githubusercontent.com/gkd-dev/unofficial_susfs/main/Patches_for_KernelSU-Next/v1.5.1/0001-susfs-4.9-v1.5.1.patch -o susfs.patch
          patch -p1 < susfs.patch || echo "Патч наложен с предупреждениями"

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Добавляем настройки напрямую в конфиг
          sed -i '$a CONFIG_KSU=y\nCONFIG_KSU_NEXT=y\nCONFIG_KSU_SUSFS=y\nCONFIG_KSU_SUSFS_SUS_PATH=y\nCONFIG_KSU_SUSFS_SUS_MOUNT=y' arch/arm64/configs/vendor/sdm845-perf_defconfig
          
          make O=out vendor/sdm845-perf_defconfig
          make O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- KCFLAGS="-Wno-error" -j$(nproc)

      - name: Prepare AnyKernel3
        run: |
          if [ -f kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/
            cd anykernel
            zip -r ../kernel-next-susfs-fajita.zip *
          else
            echo "Ошибка: Ядро не собралось, файл Image.gz-dtb отсутствует"
            exit 1
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_OP6T_KSU_Next
          path: kernel-next-susfs-fajita.zip
